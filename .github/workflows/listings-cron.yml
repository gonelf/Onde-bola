# External cron for /api/cron-listings.
#
# Vercel's free (Hobby) plan only allows a *daily* cron (configured in
# vercel.json as a baseline). But the listings store is designed to get richer
# as kickoff nears — broadcasters publish channels piecemeal — so refreshing
# only once a day is coarse. GitHub Actions schedules are free and not
# daily-limited, so we use one to poke the endpoint a few times a day. Each run
# merges into the previous result, so coverage only grows.
#
# Setup (repo Settings -> Secrets and variables -> Actions):
#   SITE_URL    = https://your-deployment.vercel.app   (no trailing slash)
#   CRON_SECRET = the same value set as CRON_SECRET in your Vercel env vars
#
# You can also run it by hand from the Actions tab (workflow_dispatch).
# Note: GitHub's scheduled runs can be delayed under load and are paused on
# repos with no activity for 60 days — for rock-solid timing, point an external
# scheduler (cron-job.org, EasyCron) at the same URL instead.

name: listings-cron

on:
  schedule:
    - cron: "0 */4 * * *" # every 4 hours (UTC)
  workflow_dispatch:

# Don't pile up overlapping runs if one is slow.
concurrency:
  group: listings-cron
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger listings sweep
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ]; then
            echo "SITE_URL secret is not set — add it in repo settings."; exit 1
          fi
          echo "Calling ${SITE_URL}/api/cron-listings ..."
          code=$(curl -s -S -o /tmp/out.json -w "%{http_code}" \
            --max-time 120 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${SITE_URL}/api/cron-listings")
          echo "HTTP ${code}"
          cat /tmp/out.json
          echo
          # Fail the run on a non-2xx so problems surface in the Actions log.
          case "$code" in 2*) exit 0 ;; *) exit 1 ;; esac
