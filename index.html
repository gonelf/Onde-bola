<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onde Bola — Football on TV worldwide</title>
  <meta name="description" content="See today's football games from around the world and which TV channels and streaming services are broadcasting them." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="./">
        <span class="brand-ball">⚽</span>
        <span class="brand-name">Onde<span>Bola</span></span>
      </a>
      <div class="header-controls">
        <label class="country-picker">
          <span class="visually-hidden">Country</span>
          <select id="country-select" aria-label="Choose your country"></select>
        </label>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="toolbar">
      <div class="date-nav">
        <button id="prev-day" class="date-btn" aria-label="Previous day">‹</button>
        <button id="today-btn" class="date-today">Today</button>
        <button id="next-day" class="date-btn" aria-label="Next day">›</button>
        <span id="current-date" class="current-date"></span>
      </div>
      <div class="search-wrap">
        <input id="search" type="search" placeholder="Search team or competition…" aria-label="Search games" />
      </div>
    </section>

    <div id="status" class="status" hidden></div>

    <section id="games" class="games" aria-live="polite"></section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>
        Fixtures via <a href="https://www.thesportsdb.com" target="_blank" rel="noopener">TheSportsDB</a>.
        TV listings are an indicative rights guide and may vary by region and platform.
      </p>
    </div>
  </footer>

  <script src="assets/data/broadcasters.js"></script>
  <script src="assets/data/sample-fixtures.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
