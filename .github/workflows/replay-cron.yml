# Daily animated match-replay post for Facebook + Instagram.
#
# Records yesterday's top finished game as the animated replay (the same
# canvas video the /admin/replay lab exports, IG-story 9:16 with the branded
# header) and schedules it on Buffer for 10:00 UTC — an hour after the daily
# games-of-the-day posts. Like reel-cron, the runner is the render backend:
# scripts/replay-cron.mjs drives /admin/replay?autorecord in headless Chromium
# (the recording runs in real time, roughly a minute), converts the capture to
# H.264 MP4, uploads to Vercel Blob and calls /api/cron-buffer-replay.
#
# Runs at 07:25 UTC, offset from buffer-cron (07:00) and reel-cron (07:15).
#
# Setup (repo Settings -> Secrets and variables -> Actions -> Secrets tab):
#   SITE_URL              = https://your-deployment.vercel.app  (no trailing /)
#   CRON_SECRET           = the same value set as CRON_SECRET in Vercel env vars
#   BLOB_READ_WRITE_TOKEN = a PUBLIC Vercel Blob store's read-write token
#   ADMIN_USER            = the /admin Basic-Auth user (as set in Vercel)
#   ADMIN_PASSWORD        = the /admin Basic-Auth password
#
# Run it by hand from the Actions tab (workflow_dispatch) with an optional
# match-date override.

name: replay-cron

on:
  schedule:
    - cron: "25 7 * * *" # daily at 07:25 UTC (yesterday's game, publishes 10:00 UTC)
  workflow_dispatch:
    inputs:
      date:
        description: "Day the match was played (YYYY-MM-DD, default yesterday)"
        required: false
        default: ""

# Don't pile up overlapping recordings if one is slow.
concurrency:
  group: replay-cron
  cancel-in-progress: false

jobs:
  replay:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Record, upload and schedule the replay
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          ADMIN_USER: ${{ secrets.ADMIN_USER }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          if [ -z "$SITE_URL" ]; then
            echo "SITE_URL secret is not set — add it in repo settings."; exit 1
          fi
          if [ -z "$BLOB_READ_WRITE_TOKEN" ]; then
            echo "BLOB_READ_WRITE_TOKEN is empty. It must be a *repository secret*:"
            echo "Settings -> Secrets and variables -> Actions -> Secrets tab -> New repository secret."
            exit 1
          fi
          DATE_FLAG=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE_FLAG="--date=${{ github.event.inputs.date }}"
          fi
          npx tsx scripts/replay-cron.mjs $DATE_FLAG

      # The mp4 + cover as a run artifact, so a bad-looking replay can be
      # inspected without digging the Blob URL out of the logs.
      - name: Upload render artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: replay
          path: out/replay/
          if-no-files-found: ignore
          retention-days: 7
