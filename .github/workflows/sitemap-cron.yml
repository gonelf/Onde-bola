# External cron for /api/cron-sitemap.
#
# The pSEO sitemap (KV registry `seo:urls`) is refreshed by a daily sweep. It is
# declared as a Vercel native cron in vercel.json, but Vercel's free (Hobby) plan
# crons are limited and easy to miss — and when the registry stops refreshing the
# sitemap silently goes stale, so search engines stop discovering new /g/<date>/…
# match pages. GitHub Actions schedules are free, so we poke the endpoint here too
# as a reliable backstop (it's idempotent — HSET upsert, so double-running is safe).
#
# Setup (repo Settings -> Secrets and variables -> Actions) — same secrets the
# highlights-cron uses:
#   SITE_URL    = https://your-deployment.vercel.app   (no trailing slash)
#   CRON_SECRET = the same value set as CRON_SECRET in your Vercel env vars
#
# You can also run it by hand from the Actions tab (workflow_dispatch).
# Note: GitHub's scheduled runs can be delayed under load and are paused on repos
# with no activity for 60 days — if you need rock-solid timing, point an external
# scheduler (cron-job.org, EasyCron) at the same URL instead.

name: sitemap-cron

on:
  schedule:
    - cron: "0 5 * * *" # daily at 05:00 UTC (mirrors vercel.json)
  workflow_dispatch:

# Don't pile up overlapping runs if one is slow.
concurrency:
  group: sitemap-cron
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sitemap sweep
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ]; then
            echo "SITE_URL secret is not set — add it in repo settings."; exit 1
          fi
          echo "Calling ${SITE_URL}/api/cron-sitemap ..."
          code=$(curl -s -S -o /tmp/out.json -w "%{http_code}" \
            --max-time 90 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${SITE_URL}/api/cron-sitemap")
          echo "HTTP ${code}"
          cat /tmp/out.json
          echo
          # cron-sitemap returns 502 when the sweep finds zero fixtures, so a
          # stale-sitemap day fails the run and surfaces in the Actions log.
          case "$code" in 2*) exit 0 ;; *) exit 1 ;; esac
