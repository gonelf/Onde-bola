<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Hoje Há Bola — Football on TV worldwide and where to watch it">
  <defs>
    <radialGradient id="bg" cx="80%" cy="-10%" r="90%">
      <stop offset="0%" stop-color="#1a2940"/>
      <stop offset="55%" stop-color="#0f1722"/>
      <stop offset="100%" stop-color="#0b1018"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16d27a"/>
      <stop offset="100%" stop-color="#0fae63"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="8" fill="url(#accent)"/>

  <text x="80" y="180" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="120">⚽</text>

  <text x="230" y="170" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="84" font-weight="800" fill="#e8eef5">Hoje Há <tspan fill="#16d27a">Bola</tspan></text>

  <text x="80" y="330" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="56" font-weight="700" fill="#e8eef5">Football on TV worldwide</text>
  <text x="80" y="410" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="56" font-weight="700" fill="#93a4b8">&amp; where to watch it</text>

  <g font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="30" fill="#0f1722" font-weight="700">
    <rect x="80" y="480" width="360" height="64" rx="32" fill="url(#accent)"/>
    <text x="120" y="522">Live scores · TV listings</text>
  </g>
  <g font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="30" fill="#e8eef5" font-weight="600">
    <rect x="470" y="480" width="300" height="64" rx="32" fill="#1c2a3a" stroke="#26384c"/>
    <text x="508" y="522">Free &amp; paid channels</text>
  </g>
</svg>
